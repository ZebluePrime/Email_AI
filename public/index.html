<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Triage</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f4f4f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; }
        .queue-item { border: 1px solid #e4e4e7; padding: 15px; margin-bottom: 10px; border-radius: 6px; }
        .btn-approve { background: #22c55e; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-dismiss { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inbox Triage Queue</h1>
        <div id="queue-container">
            <p>Waiting for AI to process emails...</p>
        </div>
    </div>
</body>
</html>
